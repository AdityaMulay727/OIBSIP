<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNINPAGE | ADITYA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="square">
    <div class="icon">
        <div class="emoji">🎉</div>
        <h4>WELCOME !</h4>
        <h5>You Have Successfully Logged In!</h5>

        <div class="cards-container">

            <div class="card1" onclick="resume()" style="cursor:pointer;">
                <div class="emoji1" style="background:#fef3e2;">📒</div>
                <div class="thump1">
                    <h6>RESUME ACCESS</h6>
                    <p>This is my resume <br> have a look !</p>
                </div>
            </div>

            <div class="card1" onclick="linkedin()" style="cursor:pointer;">
                <div class="emoji1" style="background:#fef3e2;">🚀</div>
                <div class="thump1">
                    <h6>MY LINKEDIN PROFILE</h6>
                    <p>Have a Look In My Linkedin Profile Guys!</p>
                </div>
            </div>

            <div class="card1" onclick="git()" style="cursor:pointer;">
                <div class="emoji1" style="background:#fef3e2;">✅</div>
                <div class="thump1">
                    <h6>GIT & GITHUB</h6>
                    <p>Have a look in <br>my github guys !</p>
                </div>
            </div>
        </div>
        <button class="log"  onclick="OUT()">LOGOUT</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>

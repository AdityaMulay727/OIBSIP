<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Authentication | OIBSIP</title>
    <link rel="stylesheet" href="sheet.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">✦</div><br>
            <h1>Create Account</h1>
            <p class="para">Register to get started for free</p>

            <div class="input">
                <h4>FULL NAME</h4>
                <input id="box1" type="text" placeholder="Enter your full name">

                <h4>EMAIL ADDRESS</h4>
                <input id="box2" type="email" placeholder="Enter your email">

                <h4>PASSWORD</h4>
                <input id="box3" type="password" placeholder="Minimum 6 characters">

                <h4>CONFIRM PASSWORD</h4>
                <input id="box4" type="password" placeholder="Re-enter your password">

                <button class="btn" onclick="register()">Create Account →</button>

                <div class="accounts">
                    <p>Already have an account?</p>
                    <a href="index.html">Sign in here</a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
